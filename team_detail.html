{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h1>Member Directory</h1>
    <div class="mobile-table">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Branch</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                {% for member in members %}
                <tr>
                    <td>{{ member.full_name }}</td>
                    <td>{{ member.email }}</td>
                    <td>{{ member.phone or '—' }}</td>
                    <td>{{ member.branch or '—' }}</td>
                    <td>{{ member.role }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
